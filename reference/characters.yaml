# Character alias dictionary for the Cursed Sentiment pipeline.
#
# Each character has:
#   id              — canonical snake_case identifier, used everywhere downstream
#   display_name    — what the dashboard shows
#   role            — protagonist | antagonist | supporting | minor
#   affiliation     — jujutsu_high | curse_user | special_grade | civilian | other
#   status          — alive | deceased | unknown (as of canon end)
#   aliases         — list of {string, mode, weight} entries
#     mode          — substring | word_boundary | requires_context
#     weight        — confidence in [0, 1] propagated to fact tables
#   notes           — optional free-text for documentation purposes
#
# Match modes:
#   substring          — match anywhere in text (use for unambiguous full names)
#   word_boundary      — match only at word boundaries (use for short tokens)
#   requires_context   — only resolves if another character indicator is in the same post

- id: gojo_satoru
  display_name: "Gojo Satoru"
  role: protagonist
  affiliation: jujutsu_high
  status: deceased
  aliases:
    - {string: "Gojo Satoru", mode: substring, weight: 1.0}
    - {string: "Satoru Gojo", mode: substring, weight: 1.0}
    - {string: "Gojo-sensei", mode: substring, weight: 1.0}
    - {string: "Gojo", mode: word_boundary, weight: 1.0}
    - {string: "Satoru", mode: word_boundary, weight: 0.7}
    - {string: "Six Eyes", mode: substring, weight: 0.85}
    - {string: "the strongest", mode: requires_context, weight: 0.6}
    - {string: "the honored one", mode: requires_context, weight: 0.7}
  notes: "Ambiguity around 'Satoru' — bare token weighted 0.7 as it could refer to others."

